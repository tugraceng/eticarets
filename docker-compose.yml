services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/platform?schema=public
      JWT_SECRET: change-me-in-docker-compose
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@localhost"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - mailhog

volumes:
  pgdata:
